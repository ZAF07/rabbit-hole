services:
  postgres:
    image: postgres:16
    container_name: rabbit-hole-postgres
    environment:
      POSTGRES_USER: rabbit
      POSTGRES_PASSWORD: rabbit
      POSTGRES_DB: rabbithole
    ports:
      - "5433:5432"
    volumes:
      - rabbithole_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabbit -d rabbithole"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  rabbithole_pgdata:
